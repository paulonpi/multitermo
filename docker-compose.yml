services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_SERVER_URL: http://localhost:3001

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: dev
    volumes:
      - ./server:/app
      - server_node_modules:/app/node_modules
      - server_words:/app/words
    ports:
      - "3001:3001"
    environment:
      REDIS_URL: redis://redis:6379
      PORT: "3001"
      CORS_ORIGIN: http://localhost:5173
    depends_on:
      redis:
        condition: service_healthy
    command: sh -c "[ -f words/valid.json ] || pnpm run prepare-words; pnpm run dev"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  redis_data:
  server_node_modules:
  server_words:
  frontend_node_modules:
