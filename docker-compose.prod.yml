services:
  frontend:
    build:
      context: ./frontend
      target: prod
      args:
        VITE_SERVER_URL: ${VITE_SERVER_URL}
    networks:
      proxy:
        aliases: [termo-frontend]
    restart: unless-stopped

  server:
    build:
      context: ./server
      target: prod
    environment:
      REDIS_URL: redis://redis:6379
      PORT: 3001
      CORS_ORIGIN: ${CORS_ORIGIN}
      PUBLIC_URL: ${PUBLIC_URL:-${CORS_ORIGIN}}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      default: {}
      proxy:
        aliases: [termo-server]
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - termo_redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  termo_redis_data:

networks:
  default: {}
  proxy:
    external: true
