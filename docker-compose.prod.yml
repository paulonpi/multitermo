services:
  frontend:
    build:
      context: ./frontend
      target: prod
      args:
        VITE_SERVER_URL: ${VITE_SERVER_URL}
    restart: unless-stopped

  server:
    build:
      context: ./server
      target: prod
    environment:
      REDIS_URL: redis://redis:6379
      PORT: 3001
      CORS_ORIGIN: ${CORS_ORIGIN}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - server
    restart: unless-stopped

volumes:
  redis_data:
  caddy_data:
  caddy_config:
